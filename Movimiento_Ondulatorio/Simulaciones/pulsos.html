<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Ondas Unidimensionales</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: { 850: '#1f2937', 900: '#111827', 950: '#030712' }
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Bibliotecas Matemáticas y 3D -->
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/nerdamer.core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Algebra.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Calculus.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body { background-color: #030712; color: #f3f4f6; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(31, 41, 55, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(75, 85, 99, 0.4); }
        .math-input { font-family: 'Courier New', monospace; letter-spacing: 1px; }
        .mode-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }

        /* Estilos para la barra lateral auto-ocultable */
        #sidebar-container {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }
        #sidebar-container:not(:hover) {
            transform: translateX(-95%); 
        }
        #sidebar-container:hover {
            transform: translateX(0);
        }
        
        .sidebar-handle {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 8px;
            background: linear-gradient(to right, transparent, rgba(59, 130, 246, 0.3));
            cursor: pointer;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="glass-panel p-4 flex justify-between items-center z-20 shadow-lg relative">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-water text-blue-500 text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                Ondas 1D Pro
            </h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex bg-gray-900 rounded-lg p-1 border border-gray-700">
                <button id="mode-2d" class="mode-btn active px-4 py-1 rounded-md text-sm font-medium transition duration-200">2D</button>
                <button id="mode-3d" class="mode-btn px-4 py-1 rounded-md text-sm font-medium transition duration-200 text-gray-400 hover:text-white">3D</button>
            </div>

            <div class="flex items-center gap-3 border-l border-gray-700 pl-4">
                <button id="btn-reset" class="text-gray-400 hover:text-white transition"><i class="fa-solid fa-backward-step"></i></button>
                <button id="btn-play-pause" class="w-10 h-10 rounded-full bg-blue-600 hover:bg-blue-500 flex justify-center items-center transition shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                    <i class="fa-solid fa-pause text-white"></i>
                </button>
                <input type="range" id="slider-speed" min="0" max="5" step="0.1" value="1" class="w-24 accent-blue-500">
            </div>

            <div class="flex flex-col w-32 border-l border-gray-700 pl-4">
                <label class="text-[10px] text-gray-400 mb-1 uppercase">Zoom Global</label>
                <input type="range" id="slider-zoom" min="5" max="100" step="1" value="20" class="w-full accent-purple-500">
            </div>
        </div>
    </header>

    <main class="flex-1 flex relative overflow-hidden">
        
        <!-- Sidebar Auto-ocultable -->
        <aside id="sidebar-container" class="absolute left-0 top-0 bottom-0 w-96 glass-panel flex flex-col shadow-2xl border-r border-gray-800">
            <div class="sidebar-handle"></div>
            <div class="flex-1 overflow-y-auto p-4 no-scrollbar flex flex-col gap-4" id="waves-container"></div>
            <div class="p-4 border-t border-gray-800">
                <button id="btn-add-wave" class="w-full py-2 bg-gradient-to-r from-gray-800 to-gray-700 hover:from-blue-600 hover:to-purple-600 rounded-lg font-semibold transition flex justify-center items-center gap-2 border border-gray-600">
                    <i class="fa-solid fa-plus"></i> Añadir Onda
                </button>
            </div>
            <div class="p-4 border-t border-gray-800 bg-gray-900/50" id="kb-area">
                <div class="grid grid-cols-5 gap-2" id="virtual-keyboard"></div>
            </div>
        </aside>

        <!-- Área de Visualización -->
        <div class="flex-1 relative bg-gray-950 w-full h-full" id="viewport">
            <canvas id="wave-canvas" class="absolute inset-0 w-full h-full"></canvas>
            <div id="three-container" class="absolute inset-0 w-full h-full hidden"></div>

            <!-- HUD de información -->
            <div class="absolute top-4 right-4 glass-panel p-3 rounded-lg pointer-events-none border-gray-700 z-10">
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-4 h-1 bg-white rounded"></div>
                    <span class="text-xs text-gray-300">Onda Resultante</span>
                </div>
                <div class="text-[10px] text-gray-500 mt-2">
                    t: <span id="time-display" class="text-gray-300">0.00</span>s | 
                    Modo: <span id="mode-indicator" class="text-blue-400">2D</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Template Tarjeta -->
    <template id="wave-card-template">
        <div class="wave-card bg-gray-800/80 rounded-lg p-3 border border-gray-700 shadow-md relative group transition-all">
            <button class="delete-btn absolute top-2 right-2 text-gray-500 hover:text-red-500 transition opacity-0 group-hover:opacity-100">
                <i class="fa-solid fa-trash-can"></i>
            </button>
            <div class="flex items-center gap-2 mb-2">
                <input type="checkbox" checked class="visibility-toggle w-4 h-4 rounded accent-blue-500 cursor-pointer">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-tighter wave-title">Onda</span>
            </div>
            <div class="flex items-center gap-2 bg-gray-900 p-2 rounded border border-gray-700">
                <span class="text-gray-500 text-xs font-mono">y=</span>
                <input type="text" class="formula-input math-input w-full bg-transparent text-white text-sm outline-none" placeholder="sin(x-t)">
            </div>
            <div class="error-msg text-[10px] text-red-400 mt-1 hidden italic">Error de sintaxis matemática</div>
            <div class="flex gap-2 mt-2">
                <input type="color" class="color-picker w-8 h-5 rounded cursor-pointer bg-transparent border-0">
                <input type="range" class="thickness-slider flex-1 h-1 mt-2 accent-gray-500" min="1" max="5" value="2">
            </div>
        </div>
    </template>

    <script>
        const state = {
            waves: [],
            time: 0,
            isPlaying: true,
            speed: 1,
            zoom: 20,
            mode: '2d',
            waveCounter: 0,
            activeInput: null
        };

        let scene, camera, renderer, waveMesh, gridHelper, axesHelper;
        const threeContainer = document.getElementById('three-container');

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            threeContainer.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            gridHelper = new THREE.GridHelper(100, 20, 0x444444, 0x222222);
            gridHelper.rotation.x = Math.PI / 2;
            scene.add(gridHelper);

            axesHelper = new THREE.AxesHelper(60);
            scene.add(axesHelper);

            const geometry = new THREE.PlaneGeometry(100, 2, 256, 1);
            const material = new THREE.MeshPhongMaterial({ 
                color: 0xffffff, 
                side: THREE.DoubleSide, 
                wireframe: false,
                transparent: true,
                opacity: 0.9
            });
            waveMesh = new THREE.Mesh(geometry, material);
            scene.add(waveMesh);

            camera.position.set(30, -40, 40);
            camera.lookAt(0, 0, 0);

            let isDragging = false;
            let prevMouse = { x: 0, y: 0 };
            const viewport = document.getElementById('viewport');
            viewport.addEventListener('mousedown', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', (e) => {
                if (isDragging && state.mode === '3d') {
                    scene.rotation.z += (e.clientX - prevMouse.x) * 0.005;
                    scene.rotation.x += (e.clientY - prevMouse.y) * 0.005;
                }
                prevMouse = { x: e.clientX, y: e.clientY };
            });
        }

        const canvas2d = document.getElementById('wave-canvas');
        const ctx2d = canvas2d.getContext('2d');
        const wavesContainer = document.getElementById('waves-container');
        const template = document.getElementById('wave-card-template');

        function init() {
            const kbd = ["x", "t", "sin", "cos", "tan", "7", "8", "9", "+", "-", "4", "5", "6", "*", "/", "1", "2", "3", "(", ")", "0", ".", "pi", "^", "sqrt"];
            const kbContainer = document.getElementById('virtual-keyboard');
            kbd.forEach(key => {
                const b = document.createElement('button');
                b.className = "bg-gray-800 hover:bg-gray-700 text-xs py-1 rounded border border-gray-700 font-mono";
                b.textContent = key;
                b.onclick = () => {
                    if (!state.activeInput) return;
                    const val = (['sin', 'cos', 'tan', 'sqrt'].includes(key)) ? key + '()' : key;
                    const input = state.activeInput;
                    const start = input.selectionStart;
                    input.value = input.value.slice(0, start) + val + input.value.slice(input.selectionEnd);
                    input.focus();
                    input.dispatchEvent(new Event('input'));
                };
                kbContainer.appendChild(b);
            });

            document.getElementById('mode-2d').onclick = () => setMode('2d');
            document.getElementById('mode-3d').onclick = () => setMode('3d');
            document.getElementById('btn-play-pause').onclick = togglePlay;
            document.getElementById('btn-reset').onclick = () => state.time = 0;
            document.getElementById('slider-speed').oninput = (e) => state.speed = parseFloat(e.target.value);
            document.getElementById('slider-zoom').oninput = (e) => state.zoom = parseFloat(e.target.value);
            document.getElementById('btn-add-wave').onclick = () => addWave();

            window.onresize = onResize;
            onResize();
            init3D();
            
            addWave("2 * sin(x - 3*t)", "#3b82f6");
            addWave("1.5 * cos(x + 2*t)", "#8b5cf6");

            requestAnimationFrame(animate);
        }

        function setMode(m) {
            state.mode = m;
            document.getElementById('mode-2d').classList.toggle('active', m === '2d');
            document.getElementById('mode-3d').classList.toggle('active', m === '3d');
            document.getElementById('mode-indicator').textContent = m.toUpperCase();
            
            canvas2d.classList.toggle('hidden', m !== '2d');
            threeContainer.classList.toggle('hidden', m !== '3d');
            onResize();
        }

        function togglePlay() {
            state.isPlaying = !state.isPlaying;
            document.getElementById('btn-play-pause').innerHTML = `<i class="fa-solid fa-${state.isPlaying?'pause':'play'} text-white"></i>`;
        }

        function addWave(formula = "", color = "#10b981") {
            state.waveCounter++;
            const id = 'w_' + Date.now();
            const wave = { id, formula, color, isVisible: true, thickness: 2, parsedFn: null };
            state.waves.push(wave);
            
            const clone = template.content.cloneNode(true);
            const card = clone.querySelector('.wave-card');
            card.id = `card-${id}`;
            const input = clone.querySelector('.formula-input');
            
            clone.querySelector('.wave-title').textContent = `Onda ${state.waveCounter}`;
            input.value = formula;
            clone.querySelector('.color-picker').value = color;
            
            input.onfocus = () => state.activeInput = input;
            input.oninput = (e) => updateWaveMath(id, e.target.value);
            clone.querySelector('.color-picker').oninput = (e) => wave.color = e.target.value;
            clone.querySelector('.thickness-slider').oninput = (e) => wave.thickness = parseInt(e.target.value);
            clone.querySelector('.visibility-toggle').onchange = (e) => wave.isVisible = e.target.checked;
            clone.querySelector('.delete-btn').onclick = () => {
                state.waves = state.waves.filter(w => w.id !== id);
                card.remove();
            };

            wavesContainer.appendChild(clone);
            updateWaveMath(id, formula);
        }

        function updateWaveMath(id, formula) {
            const wave = state.waves.find(w => w.id === id);
            const card = document.getElementById(`card-${id}`);
            try {
                const clean = formula.replace(/pi/g, '3.14159').replace(/e/g, '2.718');
                wave.parsedFn = nerdamer(clean).buildFunction(['x', 't']);
                wave.parsedFn(0, 0);
                card.querySelector('.error-msg').classList.add('hidden');
            } catch {
                wave.parsedFn = null;
                card.querySelector('.error-msg').classList.remove('hidden');
            }
        }

        function onResize() {
            canvas2d.width = window.innerWidth;
            canvas2d.height = window.innerHeight;
            if (renderer) {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            }
        }

        function animate() {
            if (state.isPlaying) state.time += 0.016 * state.speed;
            document.getElementById('time-display').textContent = state.time.toFixed(2);

            if (state.mode === '2d') {
                render2D();
            } else {
                render3D();
            }
            requestAnimationFrame(animate);
        }

        function render2D() {
            ctx2d.clearRect(0, 0, canvas2d.width, canvas2d.height);
            const ox = canvas2d.width / 2;
            const oy = canvas2d.height / 2;
            const scale = (canvas2d.width / 2) / state.zoom;
            const step = Math.max(1, Math.floor(state.zoom / 5));

            // Dibujar Rejilla (Cuadros de fondo)
            ctx2d.strokeStyle = '#1f2937';
            ctx2d.lineWidth = 1;
            
            // Líneas Verticales
            for(let x = -state.zoom; x <= state.zoom; x += step) {
                const px = ox + (x * scale);
                ctx2d.beginPath();
                ctx2d.moveTo(px, 0);
                ctx2d.lineTo(px, canvas2d.height);
                ctx2d.stroke();
            }

            // Líneas Horizontales
            const rangeY = state.zoom * (canvas2d.height / canvas2d.width);
            for(let y = -Math.floor(rangeY); y <= Math.floor(rangeY); y += step) {
                const py = oy - (y * scale);
                ctx2d.beginPath();
                ctx2d.moveTo(0, py);
                ctx2d.lineTo(canvas2d.width, py);
                ctx2d.stroke();
            }

            // Ejes Principales
            ctx2d.strokeStyle = '#4b5563';
            ctx2d.lineWidth = 2;
            ctx2d.beginPath();
            ctx2d.moveTo(0, oy); ctx2d.lineTo(canvas2d.width, oy);
            ctx2d.moveTo(ox, 0); ctx2d.lineTo(ox, canvas2d.height);
            ctx2d.stroke();

            // Ticks Numéricos
            ctx2d.fillStyle = '#9ca3af';
            ctx2d.font = '10px monospace';
            
            ctx2d.textAlign = 'center';
            for(let x = -state.zoom; x <= state.zoom; x += step) {
                if (x === 0) continue;
                const px = ox + (x * scale);
                ctx2d.fillText(x, px, oy + 15);
                ctx2d.beginPath();
                ctx2d.moveTo(px, oy - 5); ctx2d.lineTo(px, oy + 5);
                ctx2d.stroke();
            }

            ctx2d.textAlign = 'right';
            for(let y = -Math.floor(rangeY); y <= Math.floor(rangeY); y += step) {
                if (y === 0) continue;
                const py = oy - (y * scale);
                ctx2d.fillText(y, ox - 10, py + 3);
                ctx2d.beginPath();
                ctx2d.moveTo(ox - 5, py); ctx2d.lineTo(ox + 5, py);
                ctx2d.stroke();
            }

            // Renderizado de Ondas
            const res = 2;
            const points = Math.ceil(canvas2d.width / res);
            const sumY = new Float32Array(points);
            const activeWaves = state.waves.filter(w => w.isVisible && w.parsedFn);

            activeWaves.forEach(w => {
                ctx2d.beginPath();
                ctx2d.strokeStyle = w.color;
                ctx2d.lineWidth = w.thickness;
                for (let i = 0; i < points; i++) {
                    const px = i * res;
                    const mx = (px - ox) / scale;
                    const my = w.parsedFn(mx, state.time);
                    sumY[i] += my;
                    const py = oy - (my * scale);
                    if (i === 0) ctx2d.moveTo(px, py); else ctx2d.lineTo(px, py);
                }
                ctx2d.stroke();
            });

            if (activeWaves.length > 0) {
                ctx2d.beginPath();
                ctx2d.strokeStyle = '#ffffff';
                ctx2d.lineWidth = 3;
                for (let i = 0; i < points; i++) {
                    const py = oy - (sumY[i] * scale);
                    if (i === 0) ctx2d.moveTo(i * res, py); else ctx2d.lineTo(i * res, py);
                }
                ctx2d.stroke();
            }
        }

        function render3D() {
            const positions = waveMesh.geometry.attributes.position.array;
            const activeWaves = state.waves.filter(w => w.isVisible && w.parsedFn);
            const pointsCount = 256;

            for (let i = 0; i <= pointsCount; i++) {
                const x = (i / pointsCount) * 100 - 50; 
                const mx = x / (100 / (state.zoom * 2)); 
                let y = 0;
                activeWaves.forEach(w => y += w.parsedFn(mx, state.time));
                
                const scaledY = y * (100 / (state.zoom * 2));
                positions[i * 6 + 2] = scaledY; 
                positions[i * 6 + 5] = scaledY;
            }
            waveMesh.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
